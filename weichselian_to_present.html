<title>Panke Region Timeline</title>
<style>
  :root {
    --event-width: 200px;
    --font-size: 10pt;
    --stack-gap: 10px;
    --group-gap: 30px;
    --side-padding: 40px;
    --line-y: 100px; /* <--- Gap fixed here */
    --line-event-margin: 10pt;
  }
  html,body{margin:0;padding:0;width:100%;font-family:Arial,sans-serif;background:#fafafa;}
  #legend{display:flex;flex-wrap:wrap;gap:14px;padding:12px 20px;background:#fff;border-bottom:1px solid #ddd;font-size:var(--font-size);}
  .legend-item{display:flex;align-items:center;gap:6px;}
  .legend-dot{width:10pt;height:10pt;border-radius:50%;display:inline-block;flex-shrink:0;}
  #timeline-outer{width:100%;overflow-x:auto;overflow-y:hidden;background:#fafafa;box-sizing:border-box;}
  #timeline-inner{position:relative;height:auto;}
  .tick-line{position:absolute;height:3px;background:#333;left:0;}
  .tick-marker{position:absolute;width:10pt;height:10pt;border-radius:50%;background:#333;transform:translate(-50%,-50%);z-index:3;}
  .date-label{position:absolute;font-size:var(--font-size);font-weight:bold;font-family:Arial,sans-serif;color:#222;white-space:nowrap;text-align:left;transform:translateY(-100%);}
  .event-text{position:absolute;width:var(--event-width);font-size:var(--font-size);font-weight:normal;font-family:Arial,sans-serif;white-space:normal;overflow-wrap:break-word;word-wrap:break-word;text-align:left;line-height:1.25;}
</style>

<script>
const DATA = {"themes": [{"name": "Tegeler Fließ", "full": "Tegeler Fließ – Pollen Analysis Evaluation", "color": "#2E7D32"}, {"name": "Französisch Buchholz", "full": "Französisch Buchholz – Development (Settlement, Landscape, Infrastructure, Allotments)", "color": "#1565C0"}, {"name": "Motorway", "full": "Motorway – Chronological Development of the A114 (formerly A14)", "color": "#C62828"}, {"name": "Panke", "full": "Panke – Pollen Analysis and River/Landscape Development", "color": "#AD1457"}, {"name": "Blankenburg", "full": "Blankenburg – Lange's Findings and General Development (Settlement, Landscape, Infrastructure, Allotments)", "color": "#E65100"}, {"name": "Railway Line", "full": "Railway Line – Chronology of Blankenburg-Buch and Karower Kreuz", "color": "#6A1B9A"}, {"name": "Sewage Farm Management", "full": "Sewage Farm Management – Dated Information for Berlin", "color": "#00838F"}, {"name": "North Berlin", "full": "North Berlin – Pollen Analysis Evaluation", "color": "#6D4C41"}, {"name": "Brandenburg", "full": "Brandenburg – Pollen Analysis Evaluation", "color": "#827717"}, {"name": "Allotment Gardens", "full": "Allotment Gardens – Overarching Development in Germany", "color": "#283593"}], "events": [{"date": "350,000–130,000 years ago", "entries": [{"theme": "North Berlin", "color": "#6D4C41", "text": "Formation of a hollow in the Krummes Fenn area possibly through glacial erosion (Brande, 2000)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Glacial erosion during the Saalian glaciation (Brande, 2000)."}]}, {"date": "130,000–115,000 years ago (Eemian Interglacial)", "entries": [{"theme": "North Berlin", "color": "#6D4C41", "text": "Deposition of peaty sediments in the Krummes Fenn (Brande, 2000)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Deposition of peaty sediments during the last interglacial (Brande, 2000)."}]}, {"date": "Beginning of Weichselian Glacial Stage to Present", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Vegetation history around Tegeler See involves landscape development of the Tegeler Fließ area (Sukopp & Brande, 1984/85; Fiege & Böse, 2021)."}, {"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Former rural community along the Panke (WebArt.media, 2011)."}, {"theme": "Panke", "color": "#AD1457", "text": "Formation of the Panke valley and initial glacial gully; stratigraphy shows layers of fine sand, gravel, and boulder clay (Wikipedia, 2024). Regional study focuses on historical periods from Barnim to North Berlin (WebArt.media, 2011)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "District along the Panke route with historical settlement relevance (WebArt.media, 2011)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Pollen analysis in Heiligensee and Lingenpfuhl shows Germanic and Slavic era cereal pollen (Brande, 1978/79, 1992; Fiege & Böse, 2021)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Pollen analysis indicates vegetation shifts and agricultural markers (Kaiser et al., 2018; Fiege & Böse, 2021). Landscape shaped by northern ice sheet; formation of drainage channels and glacial spillways (Urstromtäler) 2."}]}, {"date": "Approx. 24,000 – 20,000 ka (Frankfurt Phase / W1F)", "entries": [{"theme": "Panke", "color": "#AD1457", "text": "River Panke occupies a depression between ridges formed during ice retreat; meltwater collected in the Berlin ice-marginal valley (Hardt et al., 2015)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "Formation of lobe-shaped ridges (1000-1500m length) composed of glacial till on glaciofluvial sediments during ice retreat (Hardt et al., 2015)."}]}, {"date": "Approx. 20,000 years ago (Weichselian Glaciation)", "entries": [{"theme": "North Berlin", "color": "#6D4C41", "text": "Glaciation and deposition of till; formation of the ground moraine landscape and meltwater channels (Brande, 2000)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Overriding by inland ice and deposition of till (Brande, 2000). Landscape development associated with W1B and W1F advances (Hardt et al., 2014)."}]}, {"date": "Approx. 19,000 ka (W1B Ice Retreat)", "entries": [{"theme": "Panke", "color": "#AD1457", "text": "Estimated time of ice retreat based on Be-10 dating (Heine et al., 2009, cited in Hardt et al., 2015)."}]}, {"date": "14,500 BP (Start of Lateglacial)", "entries": [{"theme": "Brandenburg", "color": "#827717", "text": "Meiendorf Interstadial: spread of shrub birch, willow, juniper, and sea buckthorn. Light vegetation with Helianthemum and Artemisia (Jahns et al., 2018)."}]}, {"date": "c. 12,700–9,500 B.C. (Late Glacial)", "entries": [{"theme": "North Berlin", "color": "#6D4C41", "text": "Formation of parabolic and longitudinal dune complexes under periglacial conditions (Pachur, 1987; Böse, 1991; Fiege & Böse, 2021)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Alternating warm and cold periods (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}]}, {"date": "Approx. 12,500 BP", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Beginning of investigation period at Tegeler See; early Weichselian Late Glacial recorded at Pechsee (Brande, 1990)."}]}, {"date": "End of the Weichselian glaciation (c. 12,000 years ago)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Formation of the Tegeler Fließ valley from melting glacier water (Panke Guide, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Formation of the Panke Valley from meltwater; creation of bogs and meandering small lakes from remaining dead ice (Panke Guide, n.d.)."}]}, {"date": "c. 11,700–10,700 B.C. (Allerød)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Pinus pollen begins to dominate; Laacher Tuff deposited; completion of lime leaching in sand soils (Brande, 1990)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Massive spread of pine (Pinus), increasing forest shade, reduction of juniper (Jahns et al., 2018)."}]}, {"date": "10,500 B.C.", "entries": [{"theme": "North Berlin", "color": "#6D4C41", "text": "Short-term interruption of development by Laacher See Tephra volcanic ash (Brande, 2000)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Influx of volcanic ash (Laacher Tuff) (Brande, 2000)."}]}, {"date": "Younger Dryas (c. 10,700–9,600 B.C.)", "entries": [{"theme": "Brandenburg", "color": "#827717", "text": "Last cold phase; re-expansion of juniper, Artemisia, and Empetrum indicating forest thinning (Jahns et al., 2018). Tundra-like vegetation and reindeer herds (Jahns, 2010). High pine frequencies (Strahl, 2013, cited in Bussemer et al., 2013)."}]}, {"date": "ca. 9,600 B.C. (Start of Holocene/Preboreal)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Dominance of Pinus and Betula (Brande in Böcker 1978)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Consolidation of dunes (Brande, 1990). Pioneering tree species like birch and pine dominate (Brande 1985b)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Temperature increase, expansion of pine-birch forests (Jahns et al., 2018). Strong rise in temperature; afforestation with light birch and pine (Jahns, 2010). Establishment of open pine-birch forests; immigration of hazel and elm (Strahl, 2013). First forests consist of Birch and Pine 2."}]}, {"date": "Post-Glacial (Late Glacial / Early Holocene)", "entries": [{"theme": "Panke", "color": "#AD1457", "text": "An 'Ur-Panke' transported water to the ice-marginal valley; pioneer vegetation established; peat deposits up to 13m thick formed in bogs (Wikipedia, 2024)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Birch and pine were the first colonizing plants in the box valleys of the Panke and Lietzengraben (Wikipedia, 2024)."}]}, {"date": "Approx. 10,000 years ago (Post-Last Glacial Period)", "entries": [{"theme": "Panke", "color": "#AD1457", "text": "Ideal conditions for settlement; glacial runoff formed the Panke depression and Tegeler Fließ valley, providing water mills and fish (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}]}, {"date": "ca. 8,700 – 7,300 B.C. (Boreal)", "entries": [{"theme": "North Berlin", "color": "#6D4C41", "text": "Expansion of hazel bushes; immigration of first thermophilous broad-leafed trees (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Explosive spread of hazel (Corylus) due to light-rich forest conditions; oak, lime, and elm begin to spread (Jahns et al., 2018). Mass expansion of hazel across Brandenburg (Jahns, 2010)."}]}, {"date": "c. 7,300 B.C. (Atlantic)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Rise in water level in Spree-Havel system; presence of natural Calluna stands on wet soils (Brande, 1990)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Mixed woodland of pine, oak, elm, lime, and ash (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Postglacial climatic optimum; mixed woodland; rise in groundwater table favored alder spread (Jahns, Christiansen, Kirleis, & Sudhaus, 2013). Development of oak-mixed forests (Jahns, 2010). Landscape covered by dense mixed oak forest; lowland alder forests 2."}]}, {"date": "Stone Age (General/Mesolithic / 8,000–6,000 BC)", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Oldest traces of Stone Age activity; nomadic hunters and gatherers (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Mesolithic climate improvement; tundra replaced by dense oak, alder, birch, and linden forests. Fishing began in Panke depression (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.). Landscape featured oak-mixed forest (Wikipedia, 2026)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Mesolithic shift to standing game due to forestation (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}]}, {"date": "c. 5,300 B.C. (Neolithic onset)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Decline of Ulmus; first pollen markers of Neolithic land use; initial anthropogenic eutrophication of Lake Tegel (Brande, 1990)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Human cultural development becomes an increasingly important factor in woodland composition (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Beginning of sedentary life. Early agriculture (LBK) small-scale; little impact on regional forest pollen (Jahns et al., 2018). Farmers and pastoralists increasingly influence forest composition (Jahns, 2010). First agrarian cultures; human impact via wood extraction and agriculture 2."}]}, {"date": "c. 4,000 B.C. (Atlantic/Subboreal Transition)", "entries": [{"theme": "North Berlin", "color": "#6D4C41", "text": "Dramatic decrease in elm stands, possibly due to fungal disease (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Massive decline of elm. Spread of beech, possibly aided by human-created openings (Jahns et al., 2018). End of Atlantic and start of Subboreal (VIII) (Jahns, 2010). Oak-mixed forests impoverished in elm but rich in oak and lime (Strahl, 2013)."}]}, {"date": "3rd Millennium B.C. / 3,000–1,800 BC (Neolithic)", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Signs of settlement found near Majakowskiring (Panke.guide, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Funnelbeaker cultures migrated up the Spree; permanent settlement in small river valleys (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.). Alluvial forests pushed back for meadows and arable land (Wikipedia, 2026)."}]}, {"date": "c. 2,000 B.C. (Bronze Age onset)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Evaluation of Sacrower See shows oak decline, used as timber (Jahns et al., 2018)."}, {"theme": "Panke", "color": "#AD1457", "text": "Bronze Age settlement in the Buch basin with approx. 80 houses (Wikipedia, 2026)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Climatic cooling; favored spread of common beech and hornbeam in the Subboreal (VIII) (Jahns, Christiansen, Kirleis, & Sudhaus, 2013). Expansion of beech reaches high levels; introduction of cattle-drawn plow 2."}]}, {"date": "Bronze Age (General)", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Discovery of two bronze swords evidencing smithery (Panke.guide, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Lusatian culture settled along Panke. Major village found in Buch with 15sqm timber houses (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "Depot/hoard finds including weapons, jewelry, and vessels (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}]}, {"date": "Subboreal (Late Bronze Age)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Intensified land use (Zone 11 to 12); expansion of Scleranthus perennis; reactivation of dune sand movements (Brande, 1990)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Increase in settlement indicators (Cerealia, Plantago lanceolata) and open land. Heavy use of oak (Jahns et al., 2018)."}]}, {"date": "c. 800 B.C. (Older Subatlantic / Iron Age)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Regional spread of Fagus and Carpinus, though poorly preserved in specific local profiles (Brande, 2012). Decline of Corylus and Tilia (Brande, 1990)."}, {"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Settlement traces and burial grounds found in Buchholz (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Bog iron found in Panke lowlands. German tribes lived in longhouses (Wohnstallhäuser) (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.). Thinly populated; settlements on flood-free sand plateaus (Wikipedia, 2026)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Highest proportion of beech and hornbeam reached during Iron Age (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Further cooling; decline of hazel and lime (Jahns, Christiansen, Kirleis, & Sudhaus, 2013). Introduction of the iron sickle; pine composition in Brandenburg Valley 2."}]}, {"date": "c. 200 B.C. – early 4th century A.D. (Roman Iron Age)", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Possible link to 'Buchholz' name through demand for beech wood for lime burning (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Semnones (Suebi) lived along the Panke; transitioned to rotary mills for grain (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.). Significant finds in Zepernick and Barnim (Wikipedia, 2026)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Climate optimum. Quercus dominates (35%), Carpinus high (14-29%). Secale cultivation established. Wet conditions (Jahns et al., 2018; Wolf & Jahns, 2024)."}]}, {"date": "c. A.D. 375–600 (Migration Period)", "entries": [{"theme": "Panke", "color": "#AD1457", "text": "Germanic tribes abandoned the Panke area due to southward migration (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "Germanic tribes largely depart; Slavic tribes move in (Bernschein, dorfanger-blankenburg.de)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Forest regeneration; hornbeam expansion (Jahns, Christiansen, Kirleis, & Sudhaus, 2013). Climate cooling; Secale disappears. Fagus increase (Jahns et al., 2018; Wolf & Jahns, 2024). Mixed oak-alder-beech-hornbeam time 2."}]}, {"date": "6th - 10th Century (Slavic Period)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Development of anthropogenic Calluna heaths (Brande, 1990)."}, {"theme": "Panke", "color": "#AD1457", "text": "Slavic settlement (Sprewane) on the Barnim; animal husbandry and fishing (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.). Slavic castle complex located on the Panke (Bernschein, 2008)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "Castle built on the Burgwall in 7th/8th century; fortification burned and rebuilt (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.; Panke.guide, n.d.). Pollen shows strong agriculture: Secale, Triticum, Hordeum, and millet (Lange, 1978)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Index of cereal to Plantago indicates high emphasis on crop cultivation (Jacob, 1962, cited in Lange, 1978)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Maximum spread of common beech and hornbeam (Jahns, Christiansen, Kirleis, & Sudhaus, 2013). Slavic arrival; crop rotation (millet/rye). Localized deforestation around castles (Jahns et al., 2018). Forest clearing restricted to vicinity of settlements (Jahns, 2010)."}]}, {"date": "11th Century", "entries": [{"theme": "Panke", "color": "#AD1457", "text": "Foundation of Bernau on a diluvial plateau (Wikipedia, 2024)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "Fortification abandoned (Panke.guide, n.d.)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Most woodland transformed into arable land or pasture; extensive deforestation (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Widespread forest clearances (Younger Subatlantic X) (Jahns, Christiansen, Kirleis, & Sudhaus, 2013)."}]}, {"date": "12th Century (High Medieval)", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Expansion of wetlands likely due to mill damming of the Havel in Spandau (Kaiser et al., 2018; Fiege & Böse, 2021)."}, {"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Arrival of Cistercian monks in Brandenburg as pioneers for colonization (Panke.guide, n.d.)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Regional pollen data shows massive deforestation of oak and beech for 'Landesausbau' (Jahns et al., 2018)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Severe reduction of forests due to Cistercian expansion. Dominance of rye, appearance of buckwheat (Jahns et al., 2018). Transformation of forests into open cultural landscape (Jahns, 2010)."}]}, {"date": "c. 1200 – 1230 A.D.", "entries": [{"theme": "Tegeler Fließ", "color": "#2E7D32", "text": "Widespread forest clearing (German Ostsiedlung); hydrologic impact of mill dams causing peat formation (Brande, 1990)."}, {"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Establishment of community along the Panke (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Systematic land development along the Panke under Margraves Johann I and Otto III (Siedlungsgeschichte der alten Dorfgemeinden von Pankow, n.d.)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "Founding of the village of Blankenburg during the German colonization period (Bernschein, dorfanger-blankenburg.de)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Establishment of Heiligensee; increase in rye and segetal flora (von Müller & Seyer, 1991; Brande, 1978/79; Fiege & Böse, 2021)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Land clearance and settlement during the German 'Landnahme' (Brande, 2000). Cannabis cultivation begins (Brande, 2012)."}]}, {"date": "May 22, 1251", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Construction of oldest part of church in late Romanesque style (Panke.guide, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Documented ownership transfer of a mill on the Panke from Knight Fridericus de Chare to Spandau Benedictine nuns (Wikipedia, 2024)."}]}, {"date": "1375", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "First mention of Rosenthal (Panke.guide, n.d.)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "First written mention of 'Blanckenburg' in the Landbuch of Emperor Charles IV; village has 42 Hufen (Panke.guide, n.d.; Bernschein, 2008)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Land Register records 58–62 Hufen in Heiligensee; 23 Kossäten families listed (Schlickeiser, 2008; Fiege & Böse, 2021)."}]}, {"date": "1450–1850 (Little Ice Age)", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Arnt von Bredow listed as sole owner of Buchholz (Panke.guide, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "LIA characterized by cold winters, shortened vegetation periods, and glacial advances (Behringer, 1995, cited in Kahle, 2025)."}, {"theme": "North Berlin", "color": "#6D4C41", "text": "Von Bredow family pledges half of arable lands; pollen shows decline in cereal and increase in birch/hazel on fallow land (Dürks, 1937; Brande, 1992; Fiege & Böse, 2021)."}, {"theme": "Brandenburg", "color": "#827717", "text": "Quercus promoted for swine mast (Wiethold, 2004; Wolf & Jahns, 2024). Forest degradation leading to open landscape (Fischer et al., 2004; Wolf & Jahns, 2024)."}]}, {"date": "1618–1648 (Thirty Years' War)", "entries": [{"theme": "Französisch Buchholz", "color": "#1565C0", "text": "Inflation, looting by Wallenstein's troops, and depopulation (Panke.guide, n.d.)."}, {"theme": "Panke", "color": "#AD1457", "text": "Count Udo of the Split Claw allegedly drowned in the Panke in 1631 (Panke Guide, n.d.)."}, {"theme": "Blankenburg", "color": "#E65100", "text": "Devastation, famine, and abandoned farms in Blankenburg (Panke.guide, /*
  CONFIGURATION
  Change EVENT_TEXT_WIDTH below, or set --event-width in CSS above.
  All tick spacing and stacked-event positions adapt automatically.
*/
const EVENT_TEXT_WIDTH = 200; // pixels; set to any width you want
const FONT_PT = 10;
const LINE_Y = 100; /* Also fixed here to match CSS */
const LINE_EVENT_MARGIN = 10 * 96 / 72;
const STACK_GAP = 10;
const GROUP_GAP = 30;
const SIDE_PADDING = 40;
const DATE_LABEL_OFFSET = 30;

const root = document.documentElement;
root.style.setProperty('--event-width', EVENT_TEXT_WIDTH + 'px');

const themes = DATA.themes;
const events = DATA.events;
const legendDiv = document.getElementById('legend');
themes.forEach(t=>{
  const item=document.createElement('div'); item.className='legend-item';
  const dot=document.createElement('span'); dot.className='legend-dot'; dot.style.background=t.color;
  const label=document.createElement('span'); label.textContent=t.name;
  item.append(dot,label); legendDiv.appendChild(item);
});

const canvas=document.createElement('canvas');
const ctx=canvas.getContext('2d');
function dateLabelWidth(text){ctx.font=`bold ${FONT_PT}pt Arial`;return ctx.measureText(text).width;}

function measureEventHeight(text){
  const probe=document.createElement('div');
  probe.className='event-text';
  probe.style.visibility='hidden';
  probe.style.left='-99999px';
  probe.style.top='0';
  probe.style.width=EVENT_TEXT_WIDTH+'px';
  probe.textContent=text;
  document.body.appendChild(probe);
  const height=probe.getBoundingClientRect().height;
  probe.remove();
  return height;
}

function renderTimeline(){
  const inner=document.getElementById('timeline-inner');
  inner.replaceChildren();
  const groupInfo=events.map(group=>{
    const entryHeights=group.entries.map(event=>measureEventHeight(event.text));
    const groupWidth=Math.max(EVENT_TEXT_WIDTH,dateLabelWidth(group.date),20);
    return {entryHeights,groupWidth};
  });

  let cursorX=SIDE_PADDING;
  const positions=[];
  groupInfo.forEach(info=>{
    positions.push({x:cursorX,width:info.groupWidth});
    cursorX+=info.groupWidth+GROUP_GAP;
  });
  const totalWidth=cursorX+SIDE_PADDING;

  let maxStackHeight=0;
  groupInfo.forEach(info=>{
    const h=info.entryHeights.reduce((sum,eventHeight)=>sum+eventHeight+STACK_GAP,0);
    maxStackHeight=Math.max(maxStackHeight,h);
  });
  const totalHeight=LINE_Y+LINE_EVENT_MARGIN+maxStackHeight+40;
  inner.style.width=totalWidth+'px';
  inner.style.height=totalHeight+'px';
  document.getElementById('timeline-outer').style.height=(totalHeight+20)+'px';

  const line=document.createElement('div');
  line.className='tick-line'; line.style.top=LINE_Y+'px'; line.style.width=totalWidth+'px';
  inner.appendChild(line);

  events.forEach((group,index)=>{
    const tickX=positions[index].x;
    const info=groupInfo[index];
    const marker=document.createElement('div');
